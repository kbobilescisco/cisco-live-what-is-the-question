<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answer Key - CCNP AUTOCOR Jeopardy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Login Screen */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        #login-box {
            background: rgba(255,255,255,0.1);
            border: 2px solid #049fd9;
            border-radius: 15px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        #login-box h1 {
            color: #049fd9;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        #login-box p {
            color: #ccc;
            margin-bottom: 30px;
        }
        #password-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: 2px solid #049fd9;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: white;
            margin-bottom: 20px;
        }
        #password-input:focus {
            outline: none;
            border-color: #0db8ff;
            box-shadow: 0 0 10px rgba(4, 159, 217, 0.5);
        }
        #login-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #049fd9;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        #login-btn:hover {
            background: #0db8ff;
            transform: scale(1.02);
        }
        #error-msg {
            color: #ff4444;
            margin-top: 15px;
            display: none;
        }
        
        /* Answer Key Screen */
        #answer-screen {
            display: none;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #049fd9;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #cisco-logo {
            height: 35px;
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
        }
        header h1 {
            color: #049fd9;
            font-size: 1.5rem;
        }
        #status {
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.1);
        }
        #status.connected {
            color: #28a745;
            border: 2px solid #28a745;
        }
        #status.disconnected {
            color: #dc3545;
            border: 2px solid #dc3545;
        }
        
        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
        
        #waiting-state {
            display: block;
        }
        #waiting-state h2 {
            color: #049fd9;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        #waiting-state p {
            color: #ccc;
            font-size: 1.2rem;
        }
        
        #answer-display {
            display: none;
            width: 100%;
            max-width: 1200px;
        }
        #current-question {
            background: rgba(255,255,255,0.05);
            border: 2px solid #049fd9;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }
        #current-question h3 {
            color: #049fd9;
            font-size: 1.3rem;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        #question-text {
            font-size: 1.8rem;
            line-height: 1.4;
            color: white;
            margin-bottom: 20px;
        }
        #question-value {
            display: inline-block;
            background: gold;
            color: #000;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        #answer-box {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: 4px solid #fff;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 10px 40px rgba(40, 167, 69, 0.4);
        }
        #answer-box h2 {
            color: white;
            font-size: 2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #answer-text {
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            line-height: 1.3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        #buzzer-info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,193,7,0.2);
            border: 2px solid #ffc107;
            border-radius: 10px;
        }
        #buzzer-info h4 {
            color: #ffc107;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        #buzzing-team {
            font-size: 1.5rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .team-icon {
            width: 40px;
            height: 40px;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div id="login-box">
            <h1>🔒 Answer Key</h1>
            <p>Private access for host only</p>
            <input type="password" id="password-input" placeholder="Enter password" autofocus>
            <button id="login-btn" onclick="login()">UNLOCK</button>
            <div id="error-msg">❌ Incorrect password</div>
        </div>
    </div>

    <!-- Answer Screen -->
    <div id="answer-screen">
        <header>
            <div class="header-left">
                <img id="cisco-logo" src="https://www.ciscolive.com/c/dam/r/ciscolive/headlibs/img/global-event/logo-dark-2025-new.svg" alt="Cisco Live 2025">
                <h1>ANSWER KEY</h1>
            </div>
            <div id="status" class="disconnected">🔴 Offline</div>
        </header>

        <div class="content">
            <div id="waiting-state">
                <h2>⏳ Waiting for Question</h2>
                <p>Select a question on the main board to see the answer here</p>
            </div>

            <div id="answer-display">
                <div id="current-question">
                    <h3>Current Question</h3>
                    <div id="question-text"></div>
                    <span id="question-value"></span>
                </div>

                <div id="answer-box">
                    <h2>✓ Answer</h2>
                    <div id="answer-text"></div>
                </div>

                <div id="buzzer-info" style="display: none;">
                    <h4>Team Buzzed:</h4>
                    <div id="buzzing-team"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/mqtt@5.3.5/dist/mqtt.min.js"></script>
    <script>
        const CORRECT_PASSWORD = 'peaceD00d!';
        const MQTT_BROKER = 'wss://test.mosquitto.org:8081';
        const TOPIC_QUESTION = 'jeopardy/question';
        const TOPIC_BUZZ = 'jeopardy/buzz';
        
        const TEAMS = {
            ansible: {
                name: 'Ansible',
                icon: '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="#EE0000" stroke="#fff" stroke-width="3"/><text x="50" y="65" font-size="50" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">A</text></svg>'
            },
            terraform: {
                name: 'Terraform',
                icon: '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="5" width="90" height="90" rx="10" fill="#7B42BC" stroke="#fff" stroke-width="3"/><text x="50" y="70" font-size="50" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">T</text></svg>'
            },
            python: {
                name: 'Python',
                icon: '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="#3776AB" stroke="#FFD43B" stroke-width="4"/><text x="50" y="65" font-size="50" font-weight="bold" fill="#FFD43B" text-anchor="middle" font-family="Arial">P</text></svg>'
            },
            yang: {
                name: 'YANG',
                icon: '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="#2E7D32" stroke="#fff" stroke-width="3"/><path d="M50 20 L50 50 M50 50 L35 70 M50 50 L65 70 M35 70 L25 85 M35 70 L45 85 M65 70 L55 85 M65 70 L75 85" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/></svg>'
            },
            pyats: {
                name: 'pyATS',
                icon: '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="45" fill="#FF6B35" stroke="#fff" stroke-width="3"/><path d="M35 70 L35 45 Q35 35 45 35 L55 35 Q65 35 65 45 L65 55" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/><circle cx="50" cy="65" r="4" fill="white"/><path d="M42 75 L58 75" stroke="#4CAF50" stroke-width="6" stroke-linecap="round"/></svg>'
            }
        };
        
        let mqttClient = null;

        // Login functionality
        function login() {
            const password = document.getElementById('password-input').value;
            if (password === CORRECT_PASSWORD) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('answer-screen').style.display = 'flex';
                connectMQTT();
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('password-input').value = '';
                document.getElementById('password-input').focus();
            }
        }

        // Allow Enter key to login
        document.getElementById('password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        // MQTT Connection
        function connectMQTT() {
            try {
                mqttClient = mqtt.connect(MQTT_BROKER, {
                    clientId: 'answer_key_' + Math.random().toString(16).substr(2, 8),
                    clean: true,
                    reconnectPeriod: 1000
                });

                mqttClient.on('connect', () => {
                    document.getElementById('status').className = 'connected';
                    document.getElementById('status').textContent = '🟢 Connected';
                    
                    mqttClient.subscribe([TOPIC_QUESTION, TOPIC_BUZZ], (err) => {
                        if (err) console.error('Subscribe error:', err);
                    });
                });

                mqttClient.on('message', (topic, message) => {
                    const data = JSON.parse(message.toString());
                    
                    if (topic === TOPIC_QUESTION) {
                        showQuestion(data);
                    } else if (topic === TOPIC_BUZZ) {
                        showBuzzer(data.team);
                    }
                });

                mqttClient.on('error', (err) => {
                    console.error('MQTT Error:', err);
                    document.getElementById('status').className = 'disconnected';
                    document.getElementById('status').textContent = '🔴 Offline';
                });

                mqttClient.on('offline', () => {
                    document.getElementById('status').className = 'disconnected';
                    document.getElementById('status').textContent = '🔴 Offline';
                });

            } catch (err) {
                console.error('Connection failed:', err);
            }
        }

        function showQuestion(data) {
            document.getElementById('waiting-state').style.display = 'none';
            document.getElementById('answer-display').style.display = 'block';
            document.getElementById('buzzer-info').style.display = 'none';
            
            document.getElementById('question-text').textContent = data.question;
            document.getElementById('answer-text').textContent = data.answer;
            document.getElementById('question-value').textContent = '$' + data.points;
        }

        function showBuzzer(team) {
            const buzzerInfo = document.getElementById('buzzer-info');
            const buzzingTeam = document.getElementById('buzzing-team');
            
            buzzerInfo.style.display = 'block';
            buzzingTeam.innerHTML = `
                <div class="team-icon">${TEAMS[team].icon}</div>
                <span>Team ${TEAMS[team].name}</span>
            `;
        }
    </script>
</body>
</html>
