<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CCNP AUTOCOR Jeopardy - Pro Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000033; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background-color: #000055; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid gold; }
        #scoreboard { display: flex; justify-content: space-around; background-color: #111; padding: 10px; border-bottom: 1px solid #444; }
        .team-score { text-align: center; padding: 10px; border: 2px solid #444; border-radius: 5px; min-width: 140px; transition: transform 0.2s; }
        .score-val { font-size: 2rem; font-weight: bold; color: gold; display: block; }
        #game-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; flex-grow: 1; }
        .category { background-color: #000088; text-align: center; font-weight: bold; padding: 15px; text-transform: uppercase; border: 2px solid black; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .tile { background-color: #0000AA; color: gold; font-size: 2.5rem; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid black; }
        .tile:hover { background-color: #0000FF; }
        .tile.disabled { background-color: #000022; color: transparent; pointer-events: none; border-color: #222; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); justify-content: center; align-items: center; z-index: 100; }
        #modal-content { background: #000066; border: 4px solid gold; padding: 30px; width: 90%; text-align: center; border-radius: 15px; }
        #question-text { font-size: 2.8rem; margin-bottom: 20px; line-height: 1.1; }
        #answer-area { display: none; border-top: 2px solid gold; padding-top: 20px; margin-top: 20px; }
        .score-controls { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .btn-group { display: flex; flex-direction: column; align-items: center; background: #000044; padding: 10px; border-radius: 8px; border: 1px solid #555; }
        .modal-btn { background: gold; color: black; border: none; padding: 12px 25px; font-size: 1.2rem; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .add-btn { background: #28a745; color: white; margin-bottom: 5px; width: 60px; }
        .sub-btn { background: #dc3545; color: white; width: 60px; }
        footer { padding: 15px; text-align: center; background: #000055; }
    </style>
</head>
<body>

<header>
    <h1 style="color: gold;">CCNP AUTOCOR JEOPARDY</h1>
    <div id="status-msg">Standard Rules: Buzz in to answer!</div>
</header>

<div id="scoreboard"></div>
<div id="game-board"></div>

<footer>
    <button class="modal-btn" onclick="triggerFinal()">FINAL JEOPARDY</button>
</footer>

<div id="modal">
    <div id="modal-content">
        <div id="question-text"></div>
        <button class="modal-btn" id="reveal-btn" onclick="reveal()">SHOW ANSWER</button>
        
        <div id="answer-area">
            <h2 id="actual-answer" style="color: gold; font-size: 2.5rem;"></h2>
            <p>Award or deduct points for the team that buzzed in:</p>
            <div id="manual-controls" class="score-controls"></div>
            <br>
            <button class="modal-btn" style="background:#555; color:white;" onclick="closeModal()">CLOSE CLUE</button>
        </div>
    </div>
</div>

<script>
    let categories = [];
    let scores = [0, 0, 0, 0, 0];
    let currentPoints = 0;

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const board = urlParams.get('board') || 'session_1';
        try {
            const res = await fetch(`./data/${board}.json`);
            categories = await res.json();
            renderBoard();
            renderScoreboard();
        } catch (e) {
            document.getElementById('game-board').innerHTML = "<h2>Error loading JSON. check /data/ folder.</h2>";
        }
    }

    function renderScoreboard() {
        const sb = document.getElementById('scoreboard');
        sb.innerHTML = "";
        for (let i = 1; i <= 5; i++) {
            sb.innerHTML += `<div class="team-score">TEAM ${i}<span class="score-val" id="s-${i}">${scores[i-1]}</span></div>`;
        }
    }

    function renderBoard() {
        const board = document.getElementById('game-board');
        categories.forEach(c => {
            const d = document.createElement('div');
            d.className = 'category';
            d.innerText = c.name;
            board.appendChild(d);
        });
        for (let r = 0; r < 5; r++) {
            categories.forEach(c => {
                const p = (r + 1) * 100;
                const t = document.createElement('div');
                t.className = 'tile';
                t.innerText = p;
                t.onclick = () => {
                    t.classList.add('disabled');
                    currentPoints = p;
                    document.getElementById('question-text').innerText = c.questions[r].q;
                    document.getElementById('actual-answer').innerText = c.questions[r].a;
                    document.getElementById('modal').style.display = 'flex';
                    document.getElementById('answer-area').style.display = 'none';
                    document.getElementById('reveal-btn').style.display = 'inline-block';
                };
                board.appendChild(t);
            });
        }
        // Build the manual buttons once
        const ctrl = document.getElementById('manual-controls');
        for(let i=1; i<=5; i++) {
            ctrl.innerHTML += `
                <div class="btn-group">
                    <strong>T${i}</strong>
                    <button class="modal-btn add-btn" onclick="adj(${i}, ${true})">+</button>
                    <button class="modal-btn sub-btn" onclick="adj(${i}, ${false})">-</button>
                </div>`;
        }
    }

    function reveal() {
        document.getElementById('answer-area').style.display = 'block';
        document.getElementById('reveal-btn').style.display = 'none';
    }

    function adj(team, isAdd) {
        if(isAdd) scores[team-1] += currentPoints;
        else scores[team-1] -= currentPoints;
        document.getElementById(`s-${team}`).innerText = scores[team-1];
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function triggerFinal() {
        currentPoints = 0; // Wagers are handled manually
        document.getElementById('question-text').innerText = "FINAL JEOPARDY: This new 350-901 exam replaces DEVCOR and introduces a focus on AI agents and the Model Context Protocol.";
        document.getElementById('actual-answer').innerText = "What is AUTOCOR?";
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('answer-area').style.display = 'none';
        document.getElementById('reveal-btn').style.display = 'inline-block';
        alert("Teams: Write down your wagers now!");
    }

    init();
</script>
</body>
</html>
